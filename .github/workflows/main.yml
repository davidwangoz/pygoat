name: CI

on: [push]

jobs:
  sast_scan:
     name: Run Bandit Scan
     runs-on: ubuntu-latest
     steps:
     - name: Check out
       uses: actions/checkout@v2
       
     - name: Setup Python
       uses: actions/setup-python@v2
       with:
         python-version: v3.11
     - name: Install bandit
       run: pip install bandit
     - name: run bandit
       run: bandit -ll -ii -r . -f json -o bandit-findings.json

     - name: Upload findings
       uses: actions/upload-artifact@v7.0.1
       if: always()
       with:
          name: bandit findings
          path: bandit-findings.json
        
  image_scan:
     name: Build image and Scan
     runs-on: ubuntu-latest
     steps: 
      - name: Check out
        uses: actions/checkout@v2
        
      - name: Setup Docker
        uses: docker-practice/actions-setup-docker@v1
        with:
           docker_version: '24.04'
           
      - name: Build Docker image
        run: docker build -f Dockerfile -t mypygoat:lastest .
        
      - name: Install Docker scout
        run: | 
          curl -sSfL https://raw.githubusercontent.com/docker/scout-cli/main/install.sh -o install_scout.sh
          sh install_scout.sh
          
      - name: Create Docker config
        run: |
          sudo mkdir -p /etc/docker
          echo '{"experimental": true}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
      - name: Docker Scout
        run: |
          echo ${{secrets.REPO-PWD}} | docker login -u ${{secrets.REPO_USER}} --password-stin
          docker scout quickview
          docker scout cves


      
            
